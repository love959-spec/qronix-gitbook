<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>제안서 슬라이드 뷰어</title>
<style>
  :root{ --bg:#0e1525; --panel:#161f33; --line:rgba(255,255,255,.1); --txt:#eaf0ff; --muted:#9aa7c7; --brand:#5b8cff; }
  *{box-sizing:border-box; margin:0; padding:0}
  body{font-family:"Pretendard","Segoe UI","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg); color:var(--txt); min-height:100vh; display:flex; flex-direction:column}
  header{display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 20px; border-bottom:1px solid var(--line); background:rgba(0,0,0,.2)}
  header h1{font-size:16px; font-weight:700}
  header .actions{display:flex; gap:10px}
  .btn{display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px;
    font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--line);
    background:rgba(255,255,255,.05); color:var(--txt); text-decoration:none; transition:.15s}
  .btn:hover{background:rgba(255,255,255,.12)}
  .btn.primary{background:var(--brand); border-color:transparent}

  .stage{flex:1; display:flex; align-items:center; justify-content:center; position:relative; padding:24px; gap:18px}
  .slide-wrap{position:relative; display:inline-block; line-height:0;
    background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.5);
    border:1px solid var(--line)}
  /* 이미지의 원본 비율(1275x1789)을 그대로 유지하며 화면에 맞춰 축소 */
  .slide-wrap img{display:block; width:auto; height:auto; max-height:82vh; max-width:92vw; user-select:none}

  .nav{position:absolute; top:50%; transform:translateY(-50%); width:52px; height:52px; border-radius:50%;
    display:grid; place-items:center; cursor:pointer; border:1px solid var(--line);
    background:rgba(20,29,51,.85); color:#fff; font-size:24px; z-index:5; transition:.15s; backdrop-filter:blur(4px)}
  .nav:hover{background:var(--brand); transform:translateY(-50%) scale(1.08)}
  .nav.prev{left:14px} .nav.next{right:14px}
  .nav:disabled{opacity:.3; cursor:default}
  .nav:disabled:hover{background:rgba(20,29,51,.85); transform:translateY(-50%)}

  footer{display:flex; align-items:center; justify-content:center; gap:16px;
    padding:16px 20px; border-top:1px solid var(--line); background:rgba(0,0,0,.2)}
  .counter{font-size:14px; color:var(--muted); min-width:54px; text-align:center}
  .dots{display:flex; gap:8px}
  .dot{width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.25); cursor:pointer; transition:.15s}
  .dot.active{background:var(--brand); transform:scale(1.25)}
  .hint{font-size:12px; color:var(--muted)}
  @media(max-width:640px){ .nav{width:42px; height:42px; font-size:20px} .hint{display:none} header h1{font-size:14px} }
</style>
</head>
<body>
  <header>
    <h1>📑 제안업체 현황 — 슬라이드</h1>
    <div class="actions">
      <a class="btn" href="company-profile.pptx" download>📥 PPTX</a>
      <button class="btn" id="fsBtn">⛶ 전체화면</button>
    </div>
  </header>

  <div class="stage">
    <button class="nav prev" id="prevBtn" aria-label="이전">‹</button>
    <div class="slide-wrap">
      <img id="slideImg" src="assets/slides/slide1.png" alt="슬라이드" />
    </div>
    <button class="nav next" id="nextBtn" aria-label="다음">›</button>
  </div>

  <footer>
    <div class="dots" id="dots"></div>
    <div class="counter" id="counter">1 / 2</div>
    <span class="hint">← → 방향키 또는 스페이스로 넘기기</span>
  </footer>

<script>
  const slides = [
    { src: "assets/slides/slide1.png", title: "목차" },
    { src: "assets/slides/slide2.png", title: "가. 회사연혁" }
  ];
  let i = 0;
  const img = document.getElementById("slideImg");
  const counter = document.getElementById("counter");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const dotsEl = document.getElementById("dots");

  slides.forEach((_, idx) => {
    const d = document.createElement("div");
    d.className = "dot" + (idx === 0 ? " active" : "");
    d.addEventListener("click", () => go(idx));
    dotsEl.appendChild(d);
  });
  const dots = [...dotsEl.children];

  function render(){
    img.src = slides[i].src;
    img.alt = slides[i].title;
    counter.textContent = (i + 1) + " / " + slides.length;
    prevBtn.disabled = i === 0;
    nextBtn.disabled = i === slides.length - 1;
    dots.forEach((d, idx) => d.classList.toggle("active", idx === i));
  }
  function go(n){ i = Math.max(0, Math.min(slides.length - 1, n)); render(); }
  function next(){ go(i + 1); }
  function prev(){ go(i - 1); }

  prevBtn.addEventListener("click", prev);
  nextBtn.addEventListener("click", next);
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
    if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
  });
  document.getElementById("fsBtn").addEventListener("click", () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });

  render();
</script>
</body>
</html>
